[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm ci && npm run build && cd ../backend && npm ci && npx prisma generate && npm run build"

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && node dist/src/main"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
